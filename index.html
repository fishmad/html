<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic HTML</title>
  <style>
    @font-face {
      font-family: 'Open Sans';
      src: url('fonts/OpenSans-Regular.ttf') format('truetype');
      /* Add other font weights and styles if needed */
    }
    body {
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      color: black;
    }
    .box {
      background-color: rgba(239, 239, 239, 1);
      width: 1024px;
      height: 670px;
      position: absolute;
      top: 0;
      left: 0;
      display: inline-block;
    }
    .hotswap-area {
      position: absolute;
      top: 50%;
      right: 60px;
      -webkit-transform: translateY(-50%);
      -ms-transform: translateY(-50%);
      transform: translateY(-50%);
      width: 400px;
      height: 300px;
    }

    .hotswap-area img, .hotswap-area video {
      width: 100%;
      height: 100%;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 60px;
      transform: translateY(-50%);
      width: 400px;
    }

    .content ul {
      list-style: none;
      padding: 0;
    }

    .content li {
      padding-left: 1em;
      text-indent: -1em;
      margin-bottom: 10px;
    }

    .content li::before {
      content: "•";
      color: gray;
      padding-right: 0.5em;
    }

    .content li a {
      text-decoration: underline;
      color: black;
      cursor: pointer;
    }

    .content li a:visited {
      color: gray;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="content">
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed non risus. Suspendisse lectus tortor, dignissim sit amet, adipiscing nec, ultricies sed, dolor.</p>
      <ul>
        <li><a href="#" class="media-link" data-type="image" data-src="image1.jpg">Dummy Image 1</a></li>
        <li><a href="#" class="media-link" data-type="image" data-src="image2.jpg">Dummy Image 2</a></li>
        <li><a href="#" class="media-link" data-type="image" data-src="image3.jpg">Dummy Image 3</a></li>
        <li><a href="#" class="media-link" data-type="image" data-src="image4.jpg">Dummy Image 4</a></li>
        <li><a href="#" class="media-link" data-type="video" data-src="FR280X-28G3.mp4">Dummy Video</a></li>
        <li><a href="#" class="media-link" data-type="image" data-src="image6.jpg">Dummy Image 6</a></li>
      </ul>
    </div>
    <div id="hotswap-area" class="hotswap-area">
      <img src="default.jpg" alt="Default Content">
    </div>
  </div>

  <script>
    const hotswapArea = document.getElementById('hotswap-area');
    const mediaLinks = document.querySelectorAll('.media-link');

    function setupVideo(video) {
      video.addEventListener('click', () => {
        if (video.paused) {
          video.play();
        } else {
          video.pause();
        }
      });

      video.addEventListener('play', () => {
        video.style.borderColor = 'transparent';
      });

      video.addEventListener('pause', () => {
        if (!video.ended) {
          video.style.borderColor = 'aqua';
        }
      });

      video.addEventListener('ended', () => {
        video.style.borderColor = 'yellow';
      });
    }

    mediaLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const type = link.dataset.type;
        const src = link.dataset.src;

        hotswapArea.innerHTML = '';

        if (type === 'image') {
          const img = document.createElement('img');
          img.src = src;
          hotswapArea.appendChild(img);
        } else if (type === 'video') {
          const video = document.createElement('video');
          const source = document.createElement('source');
          source.src = src;
          source.type = 'video/mp4';
          video.appendChild(source);
          video.style.borderColor = 'aqua';
          hotswapArea.appendChild(video);
          setupVideo(video);
        }
      });
    });

    // Setup for initial video if it exists
    const initialVideo = hotswapArea.querySelector('video');
    if (initialVideo) {
        initialVideo.style.borderColor = 'aqua';
        setupVideo(initialVideo);
    }

  </script>
</body>
</html>
